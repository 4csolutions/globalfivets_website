# Coolify-friendly docker-compose for the full Global Five stack.
#
# Deploy this in Coolify as a "Docker Compose" application:
#   1. Create a new resource -> Docker Compose -> point to this repo.
#   2. Set the env vars listed under each service (see .env.coolify.example).
#   3. Configure persistent volumes for `mongo_data` and `backend_uploads`.
#   4. Set up Coolify domains:
#        - backend  -> https://api.your-domain.com
#        - frontend -> https://your-domain.com  (set BACKEND_URL build arg accordingly)

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${DB_NAME:-globalfive}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 20s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017}
      DB_NAME: ${DB_NAME:-globalfive}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      PORT: 8001
      SMTP_HOST: ${SMTP_HOST:-smtp.office365.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_TO_EMAIL: ${SMTP_TO_EMAIL}
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PORT:-8001}/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Coolify will assign the public domain via labels; expose internally only.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # IMPORTANT: must be the PUBLIC backend URL (Coolify domain)
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:
  backend_uploads:
